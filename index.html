<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samrat Catalog</title>

    <!-- Font Awesome 6 Icon Library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Client-side PDF Generation Engine Bundle (jsPDF) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN MODAL OVERLAY -->
<div id="loginModal" class="login-overlay">
  <div class="login-card">
    <div class="login-header">
      <img src="images/SMT_LOGO-1.png" alt="SAMRAT Logo" class="login-logo">
      <h2>SAMRAT Catalog</h2>
      <p>Sign in to continue</p>
    </div>
    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label for="usernameInput">User Name</label>
        <input type="text" id="usernameInput" required placeholder="Enter your name">
      </div>
      <div class="form-group">
        <label for="passwordInput">Password</label>
        <input type="password" id="passwordInput" required placeholder="Enter password">
      </div>
      <p id="loginError" class="login-error" style="display: none;">Invalid User Name or Password</p>
      <button type="submit" class="btn-login">Login</button>
    </form>
  </div>
</div>

<!-- MAIN CATALOG HEADER -->
<header class="catalog-header">
    <div class="brand-container">
        <!-- Logo on the left side -->
        <img src="images/SMT_LOGO-1.png" alt="SAMRAT Logo" class="brand-logo" id="companyLogo">
        
        <!-- Brand Name & Subheading -->
        <div class="brand-text">
            <h1 class="brand-name">SAMRAT</h1>
            <p class="brand-subheading">Machine & Tools LLC.</p>
        </div>
    </div>
        
    <div class="header-container">
        <div class="brand-group">
            <!-- User Info Badge & Logout moved to top header -->
            <div id="userInfo" class="user-info-badge" style="display: none; align-items: center; gap: 10px;">
                👤 <span id="loggedInUserDisplay"></span>
                <button id="logoutBtn" onclick="handleLogout()" class="btn-logout">Logout</button>
            </div>

            <!-- Top Prompt Status Block -->
            <div id="top-action-prompt">
                <span class="prompt-text">Items Selected!</span>
                <button class="submit-order-btn btn-sm" onclick="generatePDF()">
                    <i class="fa-solid fa-file-pdf"></i> Export Order PDF
                </button>
            </div>    
        </div>

        <div class="controls-wrapper">
            <input type="text" id="searchInput" placeholder="Search item or code..." oninput="renderCatalog()">
            <select id="categoryFilter" onchange="renderCatalog()">
                <option value="all">All Categories</option>
            </select>
        </div>
    </div>
</header>

    <!-- PRODUCT CATALOG GRID -->
    <main class="catalog-container">
        <div class="grid" id="productGrid"></div>
    </main>

    <!-- FLOATING ACTION BAR FOR ORDERS -->
    <div id="orderBar" class="order-bar">
        <div class="order-bar-container" style="display: flex; gap: 15px; align-items: center; width: 100%;">
            <div class="order-summary-text">
                Selected Items: <strong id="totalSelectedCount">0</strong>
            </div>

            <div class="order-controls" style="display: flex; gap: 10px; align-items: center; flex-grow: 1;">
                <label for="customerNameInput"><strong>Customer Name:</strong></label>
                <input 
                    type="text" 
                    id="customerNameInput" 
                    placeholder="Enter customer or company name" 
                    required 
                    style="padding: 8px; border: 1px solid #ccc; border-radius: 4px; flex-grow: 1;"
                />
            </div>

            <div class="order-actions" style="display: flex; gap: 10px; align-items: center;">
                <button class="submit-order-btn" onclick="generatePDF()">
                    <i class="fa-solid fa-file-pdf"></i> Generate Order PDF
                </button>
                <button type="button" class="btn-clear" onclick="clearBasket()" title="Clear Basket">
                    🗑️ Clear
                </button>
            </div>
        </div>
    </div>

    <!-- External JS -->
    <script src="script.js" defer></script>
</body>
</html>
